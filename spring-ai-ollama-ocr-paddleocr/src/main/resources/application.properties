# Ollama 配置
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.enabled=true
spring.ai.ollama.chat.options.model=MedAIBase/PaddleOCR-VL
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.embedding.enabled=false

# Spring AI 重试配置
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=5000
spring.ai.retry.on-client-errors=true

# Server 配置
server.port=8080
spring.application.name=spring-ai-ollama-ocr-paddleocr

# Swagger 配置
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Logging 配置
logging.config=classpath:conf/log4j2-dev.xml
